                              operator: In
                              values:
                                - amd64
                                - ppc64le
                                - s390x
                        weight: 3
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: kubernetes.io/arch
                              operator: In
                              values:
                                - amd64
                                - arm64
                                - ppc64le
                                - s390x
                            - key: kubernetes.io/os
                              operator: In
                              values:
                                - linux
                containers:
                  - args:
                      - --health-probe-bind-address=:6789
                      - --metrics-bind-address=127.0.0.1:8080
                      # Go logging
                      - --zap-log-level
                      - error
                      - --zap-stacktrace-level
                      - error
                      - --zap-encoder
                      - console
                      # Ansible logging
                      - "--ansible-verbosity"
                      - "1"
                      - --ansible-log-events=Everything
                    env:
                      - name: ANSIBLE_DEBUG_LOGS
                        value: "False"
                      - name: ANSIBLE_STDOUT_CALLBACK
                        value: "default"
                      - name: ANSIBLE_CALLBACK_RESULT_FORMAT
                        value: "yaml"
                      - name: ANSIBLE_GATHERING
                        value: explicit
                      - name: OPERATOR_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: WATCH_NAMESPACE
                        valueFrom:
                          configMapKeyRef:
                            name: namespace-scope
                            key: namespaces
                            optional: true
                      - name: MAX_CONCURRENT_RECONCILES_WXD_WATSONXDATA_IBM_COM
                        value: "1"
                      - name: MAX_CONCURRENT_RECONCILES_WXDADDON_WATSONXDATA_IBM_COM
                        value: "1"
                      - name: MAX_CONCURRENT_RECONCILES_WXDENGINE_WATSONXDATA_IBM_COM
                        value: "3"
                      - name: ANSIBLE_FORKS
                        value: "5"
                    image: icr.io/cpopen/ibm-lakehouse-operator@sha256:1e6b4a6bbbf24b9813c60400e652eeee34d9304975e1f67765f545dd47210132
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 6789
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 6789
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 1
                        memory: 1G
                      requests:
                        cpu: 10m
                        memory: 256Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      privileged: false
                      readOnlyRootFilesystem: false
                      runAsNonRoot: true
                securityContext:
                  runAsNonRoot: true
