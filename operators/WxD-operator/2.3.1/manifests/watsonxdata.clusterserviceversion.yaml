  description: |
    IBM&reg; watsonx.data is a new open architecture that combines the elements of the data warehouse and data lake models. The best-in-class features and optimizations available on the watsonx.data make it an optimal choice for next generation data analytics and automation.

    # Name
    IBM&reg; IBM watsonx.data

    # Details
    watsonx.data is a unique solution that allows co-existence of open source technologies and proprietary products.
    It offers a single platform where you can store the data or attach data sources for managing and analyzing your enterprise data.
    Use watsonx.data to store any type of data (structured, semi-structured, and unstructured) and
    make that data accessible directly for Artificial Intelligence (AI) and Business Intelligence (BI).
    You can also attach your data sources to watsonx.data, which helps to reduce data duplication and cost of storing data in multiple places.
    It uses open data formats with APIs and machine learning libraries, making it easier for data scientists and data engineers to use the data.
    watsonx.data architecture enforces schema and data integrity, making it easier to implement robust data security and governance mechanisms.

    ## Prerequisites
    1. To install watsonx.data, you must have a client workstation that can connect to the Red Hat&reg; OpenShift&reg; Container Platform cluster.
    2. To be able to run ib-lh-manage commands in a restricting environment
    3. Set up persistent storage
    4. Set up project on Red Hat&reg; OpenShift&reg; Container Platform cluster.
    5. Update global image pull secret
    6. Mirror image to a private container registry

    ## Resources Required

    Various Resources Required

    ## Installing
    For instructions to install IBM&reg; watsonx.data 2.3.1, contact your local sales representative.
    One of our technical team members will guide you through the installation process.

    ## Configuration
      N/A
    ### Limitations
    1. When dealing with character data, case sensitivity can be important when searching for specific matches or patterns.
    However, not all databases and query engines behave in the same way.
    Some are case insensitive by default, while others are not.
    This can lead to unexpected results if the case of the data is not taken into account.

    ### SecurityContextConstraints Requirements
    IBM&reg; watsonx.data supports several different mechanisms for securing your environment and your data.
    FIPS can also be enabled.

